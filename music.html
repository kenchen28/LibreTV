<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优点TV - 音乐</title>
    <meta name="description" content="免费在线音乐搜索与播放">
    <link rel="icon" href="favicon.ico">
    <script src="libs/tailwindcss.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .mc{transition:all .2s;cursor:pointer}.mc:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,0,0,.1)}
        .now-playing{border-color:#4f46e5!important;background:linear-gradient(135deg,#eef2ff,#e0e7ff)!important}
        .eq{display:flex;align-items:flex-end;gap:2px;height:14px}.eq span{width:3px;background:#4f46e5;border-radius:1px;animation:eqA .6s ease-in-out infinite alternate}
        .eq span:nth-child(2){animation-delay:.15s}.eq span:nth-child(3){animation-delay:.3s}.eq span:nth-child(4){animation-delay:.1s}
        @keyframes eqA{0%{height:3px}100%{height:14px}}
        .vol{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:#e5e4de;outline:none}
        .vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#4f46e5;cursor:pointer}
        .tab-btn.active{background:#4f46e5;color:#fff}
    </style>
</head>
<body class="page-bg text-gray-800 pb-28">
    <header class="bg-white border-b border-gray-200 shadow-sm relative z-20">
        <div class="max-w-7xl mx-auto px-5">
            <div class="flex items-center justify-between py-3">
                <a href="/" class="text-xl font-bold text-gray-800 hover:text-indigo-700 transition-colors">优点TV</a>
                <nav class="hidden md:flex gap-4 items-center">
                    <a href="/" class="px-3 py-1.5 rounded-md font-medium text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900">视频搜索</a>
                    <a href="/live.html" class="px-3 py-1.5 rounded-md font-medium text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900">电视直播</a>
                    <a href="/music.html" class="px-3 py-1.5 rounded-md font-medium text-sm bg-indigo-600 text-white rounded-md">音乐</a>
                    <a href="/books.html" class="px-3 py-1.5 rounded-md font-medium text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900">小说</a>
                    <a href="/swipe.html" class="px-3 py-1.5 rounded-md font-medium text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900">短视频</a>
                </nav>
                <button onclick="document.getElementById('mobNav').classList.toggle('hidden')" class="md:hidden p-2 rounded-md text-gray-600 hover:bg-gray-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
            </div>
            <div id="mobNav" class="md:hidden hidden pb-4">
                <div class="flex flex-col gap-2 pt-2 border-t border-gray-200">
                    <a href="/" class="px-4 py-2.5 rounded-md text-sm text-gray-500 hover:bg-gray-100 text-center">视频搜索</a>
                    <a href="/music.html" class="px-4 py-2.5 rounded-md text-sm bg-indigo-600 text-white text-center rounded-md">音乐</a>
                    <a href="/books.html" class="px-4 py-2.5 rounded-md text-sm text-gray-500 hover:bg-gray-100 text-center">小说</a>
                    <a href="/swipe.html" class="px-4 py-2.5 rounded-md text-sm text-gray-500 hover:bg-gray-100 text-center">短视频</a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <!-- Tabs -->
        <div class="flex gap-2 mb-6 justify-center">
            <button onclick="showTab('search')" id="tS" class="tab-btn active px-5 py-2 rounded-full text-sm font-medium">🎵 搜索试听</button>
            <button onclick="showTab('full')" id="tF" class="tab-btn px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600">🎶 完整播放</button>
            <button onclick="showTab('playlist')" id="tP" class="tab-btn px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600">📋 播放列表 <span id="pc">(0)</span></button>
        </div>

        <!-- Search tab -->
        <div id="searchPanel">
            <div class="max-w-xl mx-auto mb-6">
                <div class="flex gap-2">
                    <input type="text" id="si" placeholder="搜索歌曲、歌手..." class="flex-1 bg-white border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" onkeydown="if(event.key==='Enter')doSearch()">
                    <button onclick="doSearch()" class="px-6 py-3 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">搜索</button>
                </div>
                <div class="flex flex-wrap gap-2 mt-3">
                    <button onclick="qs('周杰伦')" class="px-3 py-1 text-xs rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600">周杰伦</button>
                    <button onclick="qs('Taylor Swift')" class="px-3 py-1 text-xs rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600">Taylor Swift</button>
                    <button onclick="qs('Adele')" class="px-3 py-1 text-xs rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600">Adele</button>
                    <button onclick="qs('薛之谦')" class="px-3 py-1 text-xs rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600">薛之谦</button>
                    <button onclick="qs('Ed Sheeran')" class="px-3 py-1 text-xs rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600">Ed Sheeran</button>
                    <button onclick="qs('BTS')" class="px-3 py-1 text-xs rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600">BTS</button>
                </div>
                <p class="text-xs text-gray-400 mt-2 text-center">🎧 试听模式 (30秒预览) · 切换「完整播放」标签收听完整歌曲</p>
            </div>
            <div id="loading" class="hidden text-center py-12"><div class="inline-block w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div></div>
            <div id="res" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
        </div>

        <!-- Full playback tab (embedded site) -->
        <div id="fullPanel" class="hidden">
            <p class="text-center text-gray-500 text-sm mb-3">完整歌曲播放 — 由歌曲宝提供</p>
            <iframe src="https://www.gequbao.com/" class="w-full border border-gray-200 rounded-lg" style="height:calc(100vh - 10rem)" sandbox="allow-scripts allow-same-origin allow-popups allow-forms" title="歌曲宝"></iframe>
        </div>

        <!-- Playlist tab -->
        <div id="plPanel" class="hidden">
            <div class="flex justify-between items-center mb-3"><span class="text-sm text-gray-500">已保存 <span id="pc2">0</span> 首</span><button onclick="clearPL()" class="text-xs text-red-500 hover:text-red-700">清空</button></div>
            <div id="plItems" class="space-y-1"></div>
            <div id="ePL" class="text-center py-16 text-gray-400"><div class="text-5xl mb-3">📋</div><p>播放列表为空，点击 ❤️ 添加歌曲</p></div>
        </div>
    </main>

    <!-- Player Bar -->
    <div id="pBar" class="fixed bottom-0 left-0 right-0 border-t border-gray-200 shadow-lg z-50 hidden" style="backdrop-filter:blur(20px);background:rgba(245,244,238,.95)">
        <div class="h-1.5 bg-gray-200 cursor-pointer" onclick="seek(event)"><div id="pF" class="h-full bg-indigo-500 rounded-r-full" style="width:0%;transition:width .1s linear"></div></div>
        <div class="max-w-6xl mx-auto px-4 py-2.5 flex items-center gap-3">
            <img id="pArt" src="" class="w-11 h-11 rounded-lg object-cover bg-indigo-100 flex-shrink-0" alt="">
            <div class="min-w-0 flex-1"><div id="pT" class="text-sm font-medium truncate">未播放</div><div id="pA" class="text-xs text-gray-500 truncate">-</div></div>
            <div class="flex items-center gap-2">
                <button onclick="prev()" class="p-1.5 hover:bg-gray-100 rounded-full">⏮</button>
                <button onclick="toggle()" class="p-2.5 bg-indigo-600 text-white rounded-full hover:bg-indigo-700" id="playBtn">▶</button>
                <button onclick="next()" class="p-1.5 hover:bg-gray-100 rounded-full">⏭</button>
            </div>
            <div class="hidden sm:flex items-center gap-2 text-xs text-gray-500">
                <span id="cT">0:00</span>/<span id="dT">0:00</span>
                <input type="range" class="vol w-16" min="0" max="100" value="80" oninput="au.volume=this.value/100">
            </div>
        </div>
    </div>
    <audio id="au" preload="auto"></audio>

    <script>
    const au = document.getElementById('au');
    let tracks = [], curIdx = -1;
    let pl = JSON.parse(localStorage.getItem('musicPL') || '[]');

    function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
    function fmt(s){if(!s)return'-';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0')}
    function qs(q){document.getElementById('si').value=q;doSearch()}
    function upc(){document.getElementById('pc').textContent='('+pl.length+')';document.getElementById('pc2').textContent=pl.length}
    function inPL(id){return pl.some(t=>t.id===id)}
    function ub(p){document.getElementById('playBtn').textContent=p?'⏸':'▶'}

    async function doSearch(){
        const q=document.getElementById('si').value.trim();
        if(!q)return;
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('res').innerHTML='';
        try{
            const r=await fetch('/api/music/search?q='+encodeURIComponent(q));
            const d=await r.json();
            tracks=(d.data||[]).filter(t=>t.preview);
            document.getElementById('loading').classList.add('hidden');
            if(!tracks.length){document.getElementById('res').innerHTML='<div class="col-span-full text-center py-16 text-gray-400">😔 没有找到结果</div>';return}
            renderTracks();
        }catch(e){
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('res').innerHTML='<div class="col-span-full text-center py-16 text-gray-400">搜索失败</div>';
        }
    }

    function renderTracks(){
        document.getElementById('res').innerHTML=tracks.map((t,i)=>{
            const cover=t.album?.cover_small||'';
            const artist=t.artist?.name||'';
            return `<div class="mc border border-gray-200 rounded-lg p-3 bg-white ${curIdx===i?'now-playing':''}" onclick="play(${i})">
                <div class="flex items-center gap-3">
                    <img src="${esc(cover)}" class="w-12 h-12 rounded-lg object-cover bg-gray-100 flex-shrink-0" alt="" onerror="this.style.display='none'">
                    <div class="min-w-0 flex-1">
                        <div class="text-sm font-medium truncate">${curIdx===i?'<span class="eq"><span></span><span></span><span></span><span></span></span> ':''}${esc(t.title_short||t.title)}</div>
                        <div class="text-xs text-gray-500 truncate">${esc(artist)}</div>
                    </div>
                    <button onclick="event.stopPropagation();tglPL(${i})" class="p-1.5 rounded-full hover:bg-gray-100 text-lg">${inPL(t.id)?'❤️':'🤍'}</button>
                    <span class="text-xs text-gray-400">${fmt(t.duration)}</span>
                </div>
            </div>`;
        }).join('');
    }

    function play(i){
        if(i<0||i>=tracks.length)return;
        curIdx=i;const t=tracks[i];
        au.src=t.preview;
        au.volume=document.querySelector('.vol')?.value/100||0.8;
        au.play().catch(()=>{});
        document.getElementById('pBar').classList.remove('hidden');
        document.getElementById('pT').textContent=t.title_short||t.title;
        document.getElementById('pA').textContent=t.artist?.name||'';
        document.getElementById('pArt').src=t.album?.cover_small||'';
        ub(true);renderTracks();
    }

    function toggle(){au.paused?(au.play(),ub(true)):(au.pause(),ub(false))}
    function next(){if(curIdx<tracks.length-1)play(curIdx+1)}
    function prev(){if(curIdx>0)play(curIdx-1)}
    function seek(e){if(!au.duration)return;const r=e.currentTarget.getBoundingClientRect();au.currentTime=(e.clientX-r.left)/r.width*au.duration}

    au.addEventListener('timeupdate',()=>{if(!au.duration)return;document.getElementById('pF').style.width=(au.currentTime/au.duration*100)+'%';document.getElementById('cT').textContent=fmt(au.currentTime);document.getElementById('dT').textContent=fmt(au.duration)});
    au.addEventListener('ended',()=>{ub(false);next()});
    au.addEventListener('pause',()=>ub(false));
    au.addEventListener('play',()=>ub(true));

    // Playlist
    function tglPL(i){
        const t=tracks[i];
        if(inPL(t.id)){pl=pl.filter(x=>x.id!==t.id)}
        else{pl.push({id:t.id,title:t.title_short||t.title,artist:t.artist?.name||'',cover:t.album?.cover_small||'',preview:t.preview,duration:t.duration})}
        localStorage.setItem('musicPL',JSON.stringify(pl));upc();renderTracks();renderPL();
    }
    function clearPL(){pl=[];localStorage.removeItem('musicPL');upc();renderPL()}
    function removePLi(i){pl.splice(i,1);localStorage.setItem('musicPL',JSON.stringify(pl));upc();renderPL()}
    function renderPL(){
        if(!pl.length){document.getElementById('plItems').innerHTML='';document.getElementById('ePL').classList.remove('hidden');return}
        document.getElementById('ePL').classList.add('hidden');
        document.getElementById('plItems').innerHTML=pl.map((t,i)=>`
            <div class="flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer hover:bg-gray-50" onclick="playFromPL(${i})">
                <img src="${esc(t.cover)}" class="w-10 h-10 rounded object-cover bg-gray-100 flex-shrink-0" alt="" onerror="this.style.display='none'">
                <div class="min-w-0 flex-1"><div class="text-sm font-medium truncate">${esc(t.title)}</div><div class="text-xs text-gray-500 truncate">${esc(t.artist)}</div></div>
                <span class="text-xs text-gray-400">${fmt(t.duration)}</span>
                <button onclick="event.stopPropagation();removePLi(${i})" class="p-1 text-gray-400 hover:text-red-500">✕</button>
            </div>
        `).join('');
    }
    function playFromPL(i){
        tracks=pl.map(x=>({id:x.id,title:x.title,title_short:x.title,artist:{name:x.artist},album:{cover_small:x.cover},preview:x.preview,duration:x.duration}));
        play(i);
    }

    function showTab(t){
        document.getElementById('searchPanel').classList.toggle('hidden',t!=='search');
        document.getElementById('fullPanel').classList.toggle('hidden',t!=='full');
        document.getElementById('plPanel').classList.toggle('hidden',t!=='playlist');
        ['tS','tF','tP'].forEach(id=>{
            const el=document.getElementById(id);
            const active=(id==='tS'&&t==='search')||(id==='tF'&&t==='full')||(id==='tP'&&t==='playlist');
            el.classList.toggle('active',active);
            el.classList.toggle('bg-gray-100',!active);
            el.classList.toggle('text-gray-600',!active);
        });
        if(t==='playlist')renderPL();
    }

    // Load chart on init
    upc();
    (async function(){
        try{
            const r=await fetch('/api/music/chart');
            const d=await r.json();
            tracks=(d.data||[]).filter(t=>t.preview);
            if(tracks.length)renderTracks();
        }catch(e){}
    })();
    </script>
</body>
</html>
